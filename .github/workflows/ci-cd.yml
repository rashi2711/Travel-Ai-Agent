# .github/workflows/ci-cd.yml
# Triggered on every push to main
# Does: lint → build Docker image → push to Docker Hub

name: TravelMind CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint & Test ─────────────────────────────────────────────
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flake8
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings only for style issues
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ── Job 2: Build & Push Docker Image ──────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint                       # Only runs if lint passes
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/travelmind:latest
            ${{ secrets.DOCKER_USERNAME }}/travelmind:${{ github.sha }}

      - name: Image built successfully
        run: echo "Docker image pushed — travelmind:${{ github.sha }}"