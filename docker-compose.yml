version: '3.8'

services:

  # ── TravelMind AI App ──────────────────────────────────────────────
  travelmind:
    build: .
    container_name: travelmind-app
    ports:
      - "8501:8501"
    env_file:
      - .env                        # Your API keys and MongoDB URI go here
    environment:
      - AI_PROVIDER=gemini          # openai | gemini | demo
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Prometheus ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: travelmind-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - monitoring
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: travelmind-grafana
    ports:
      - "3001:3000"                 # Open: http://localhost:3001
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning   # Auto-loads dashboard
    networks:
      - monitoring
    restart: unless-stopped

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data: